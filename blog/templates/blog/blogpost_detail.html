{% extends 'catalog/base.html' %}

{% block content %}
<div class="card mb-3">
    {% if post.preview %}
    <img src="{{ post.preview.url }}" class="card-img-top" alt="{{ post.title }}">
    {% endif %}
    <div class="card-body">
        <h1 class="card-title">{{ post.title }}</h1>
        <p class="text-muted">Опубликовано: {{ post.created_at|date:"d.m.Y" }} | Просмотры: {{ post.views_count }}</p>
        <div class="card-text">{{ post.content|linebreaksbr }}</div>
        <div class="mt-3">
            <a href="{% url 'blog:post_list' %}" class="btn btn-primary">Назад к списку</a>
            <a href="{% url 'blog:post_update' post.pk %}" class="btn btn-secondary">Редактировать</a>
            <a href="{% url 'blog:post_delete' post.pk %}" class="btn btn-danger">Удалить</a>
        </div>
    </div>
</div>
{% endblock %}
