{% extends 'catalog/base.html' %}

{% block content %}
<h1>{% if object %}Редактирование записи{% else %}Создание новой записи{% endif %}</h1>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{% url 'blog:post_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
